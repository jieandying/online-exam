<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>在线考试系统</title>
    <!-- <link rel="stylesheet" href="//at.alicdn.com/t/font_987928_pqv3jkd52jl.css"> -->
    <link rel="icon" type="image/x-icon" href="/static/img/icon.png"/>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <!-- 消除 Element UI dialog 遮罩动画闪烁：放在 body 末尾确保最后加载覆盖 element-ui -->
    <style>
      @keyframes v-modal-in  { 0%,100%{ opacity:0 } }
      @keyframes v-modal-out { 0%,100%{ opacity:0 } }
      .v-modal { animation:none!important; transition:none!important; opacity:0!important; }
      .v-modal-enter,.v-modal-leave { animation:none!important; opacity:0!important; }
      .dialog-fade-enter-active,.dialog-fade-leave-active { animation-duration:0s!important; }
    </style>
  </body>
