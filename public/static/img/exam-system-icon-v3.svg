<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF"/>
      <stop offset="100%" style="stop-color:#66B1FF"/>
    </linearGradient>
    
    <!-- 强调色渐变 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67C23A"/>
      <stop offset="100%" style="stop-color:#85CE61"/>
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 主背景圆 -->
  <circle cx="64" cy="64" r="58" fill="url(#mainGrad)" filter="url(#dropShadow)"/>
  
  <!-- 内层装饰圆 -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- 试卷主体 -->
  <rect x="36" y="28" width="56" height="72" rx="4" fill="#ffffff" filter="url(#dropShadow)"/>
  
  <!-- 试卷顶部标题栏 -->
  <rect x="36" y="28" width="56" height="16" rx="4" fill="url(#accentGrad)"/>
  <rect x="36" y="36" width="56" height="8" fill="rgba(255,255,255,0.3)"/>
  
  <!-- 试卷孔洞装饰 -->
  <circle cx="42" cy="36" r="2" fill="rgba(255,255,255,0.8)"/>
  <circle cx="50" cy="36" r="2" fill="rgba(255,255,255,0.8)"/>
  <circle cx="58" cy="36" r="2" fill="rgba(255,255,255,0.8)"/>
  
  <!-- 题目行 -->
  <rect x="44" y="52" width="36" height="2" rx="1" fill="#C0C4CC"/>
  <rect x="44" y="58" width="32" height="2" rx="1" fill="#DCDFE6"/>
  <rect x="44" y="64" width="40" height="2" rx="1" fill="#C0C4CC"/>
  <rect x="44" y="70" width="28" height="2" rx="1" fill="#DCDFE6"/>
  <rect x="44" y="76" width="34" height="2" rx="1" fill="#C0C4CC"/>
  <rect x="44" y="82" width="30" height="2" rx="1" fill="#DCDFE6"/>
  
  <!-- 选择题圆点 -->
  <circle cx="42" cy="53" r="2" fill="url(#accentGrad)"/>
  <circle cx="42" cy="59" r="2" fill="#E4E7ED"/>
  <circle cx="42" cy="65" r="2" fill="url(#accentGrad)"/>
  <circle cx="42" cy="71" r="2" fill="#E4E7ED"/>
  <circle cx="42" cy="77" r="2" fill="#E4E7ED"/>
  <circle cx="42" cy="83" r="2" fill="url(#accentGrad)"/>
  
  <!-- 正确答案对勾 -->
  <path d="M40 53 L41.5 54.5 L44 52" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M40 65 L41.5 66.5 L44 64" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M40 83 L41.5 84.5 L44 82" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- 装饰性图标 - 书本 -->
  <g transform="translate(72, 20)">
    <rect x="0" y="0" width="20" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.8"/>
    <rect x="0" y="2" width="16" height="3" rx="1.5" fill="#409EFF" opacity="0.6"/>
    <rect x="0" y="4" width="18" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.4"/>
  </g>
  
  <!-- 装饰性图标 - 铅笔 -->
  <g transform="translate(16, 72)">
    <rect x="0" y="0" width="3" height="16" rx="1.5" fill="#E6A23C"/>
    <rect x="0" y="12" width="3" height="4" rx="1.5" fill="#F56C6C"/>
    <circle cx="1.5" cy="1.5" r="1" fill="#FFD700"/>
  </g>
  
  <!-- 成功徽章 -->
  <g transform="translate(96, 96)">
    <circle cx="0" cy="0" r="12" fill="url(#accentGrad)" filter="url(#dropShadow)"/>
    <path d="M-6 0 L-2 4 L6 -4" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- 光泽效果 -->
  <ellipse cx="64" cy="45" rx="20" ry="10" fill="rgba(255,255,255,0.2)"/>
  
  <!-- 边框高光 -->
  <circle cx="64" cy="64" r="57" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>
