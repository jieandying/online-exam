<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67C23A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E6A23C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F56C6C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="32" cy="32" r="30" fill="url(#grad1)" stroke="#fff" stroke-width="2"/>
  
  <!-- 试卷文档 -->
  <rect x="18" y="14" width="28" height="36" rx="2" fill="#fff" stroke="#E4E7ED" stroke-width="1"/>
  
  <!-- 试卷标题线 -->
  <line x1="22" y1="20" x2="42" y2="20" stroke="#909399" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 选择题选项 -->
  <circle cx="22" cy="26" r="2" fill="url(#grad2)"/>
  <line x1="27" y1="26" x2="38" y2="26" stroke="#C0C4CC" stroke-width="1.5" stroke-linecap="round"/>
  
  <circle cx="22" cy="32" r="2" fill="#E4E7ED"/>
  <line x1="27" y1="32" x2="38" y2="32" stroke="#C0C4CC" stroke-width="1.5" stroke-linecap="round"/>
  
  <circle cx="22" cy="38" r="2" fill="#E4E7ED"/>
  <line x1="27" y1="38" x2="38" y2="38" stroke="#C0C4CC" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 对勾图标表示正确答案 -->
  <path d="M19 26 L21 28 L25 24" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 铅笔图标 -->
  <g transform="translate(35, 42)">
    <path d="M0 6 L1 5 L5 1 L7 3 L3 7 L2 8 L0 6 Z" fill="url(#grad2)"/>
    <path d="M5 1 L7 3" stroke="#fff" stroke-width="0.5"/>
    <path d="M0 6 L2 8 L0 8 Z" fill="#909399"/>
  </g>
  
  <!-- 装饰性星星 -->
  <g transform="translate(8, 8)">
    <path d="M0 3 L1 1 L3 0 L1 -1 L0 -3 L-1 -1 L-3 0 L-1 1 Z" fill="#FFD700" opacity="0.8"/>
  </g>
  
  <g transform="translate(52, 12)">
    <path d="M0 2 L0.5 0.5 L2 0 L0.5 -0.5 L0 -2 L-0.5 -0.5 L-2 0 L-0.5 0.5 Z" fill="#FFD700" opacity="0.6"/>
  </g>
</svg>
